name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0-rc.1)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: pnpm install
      - run: pnpm lint
      - run: cargo build --all-features
      - run: cargo test --all-features
      - run: pnpm typecheck
      - run: pnpm test

  build-windows:
    needs: lint-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install
      - run: cargo tauri build --bundles msi,zip,nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: PetaByte-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: PetaByte-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: PetaByte-windows-zip
          path: src-tauri/target/release/bundle/zip/*.zip

  build-macos-x86:
    needs: lint-and-test
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install
      - run: cargo tauri build --bundles dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload DMG (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: PetaByte-macos-x86_64-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-macos-arm:
    needs: lint-and-test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install
      - run: cargo tauri build --bundles dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload DMG (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: PetaByte-macos-arm64-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libfuse2
      - run: pnpm install
      - run: cargo tauri build --bundles appimage,deb
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: PetaByte-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: PetaByte-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  create-release:
    needs: [build-windows, build-macos-x86, build-macos-arm, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > ../checksums.txt
      - name: Generate release body
        run: |
          echo "## PetaByte Release ${{ github.ref_name }}" > release_body.md
          echo "" >> release_body.md
          echo "### Assets" >> release_body.md
          echo "" >> release_body.md
          echo "| Platform | Format | File |" >> release_body.md
          echo "|----------|--------|------|" >> release_body.md
          echo "| Windows | MSI Installer | \`PetaByte-windows-msi/*.msi\` |" >> release_body.md
          echo "| Windows | NSIS Installer | \`PetaByte-windows-nsis/*.exe\` |" >> release_body.md
          echo "| Windows | Portable ZIP | \`PetaByte-windows-zip/*.zip\` |" >> release_body.md
          echo "| macOS (Intel) | DMG | \`PetaByte-macos-x86_64-dmg/*.dmg\` |" >> release_body.md
          echo "| macOS (Apple Silicon) | DMG | \`PetaByte-macos-arm64-dmg/*.dmg\` |" >> release_body.md
          echo "| Linux | AppImage | \`PetaByte-linux-appimage/*.AppImage\` |" >> release_body.md
          echo "| Linux | DEB | \`PetaByte-linux-deb/*.deb\` |" >> release_body.md
          echo "" >> release_body.md
          echo "### Checksums" >> release_body.md
          echo "\`\`\`" >> release_body.md
          cat checksums.txt >> release_body.md
          echo "\`\`\`" >> release_body.md
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            checksums.txt
          draft: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
